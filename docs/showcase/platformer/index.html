<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starter Kit 3D Platformer - Aperture</title>
    <link rel="icon" type="image/svg+xml" href="/aperture/showcase/platformer/aperture.svg" />
    <style>
      @font-face {
        font-family: "Lilita One";
        src: url("/aperture/showcase/platformer/fonts/lilita_one_regular.ttf") format("truetype");
        font-weight: 400;
      }

      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #5c6476;
      }

      #aperture {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
        touch-action: none;
      }

      #hud {
        position: absolute;
        left: 36px;
        top: 28px;
        display: flex;
        align-items: center;
        gap: 6px;
        color: #fff;
        font:
          400 48px/1 "Lilita One",
          system-ui,
          sans-serif;
        text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.376);
        user-select: none;
        pointer-events: none;
        z-index: 5;
      }

      #hud img {
        width: 52px;
        height: 52px;
        image-rendering: pixelated;
      }

      #hud .x {
        opacity: 0.85;
      }

      #engine-badge {
        position: absolute;
        bottom: 14px;
        right: 14px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: #fff;
        font:
          600 12px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0.02em;
        text-decoration: none;
        background: rgba(18, 20, 32, 0.42);
        padding: 8px 15px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px) saturate(140%);
        -webkit-backdrop-filter: blur(8px) saturate(140%);
        z-index: 10;
        transition:
          background 0.16s ease,
          transform 0.16s ease,
          box-shadow 0.16s ease;
      }
      #engine-badge .badge-logo {
        width: 14px;
        height: 14px;
        display: block;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.45));
      }
      #engine-badge:hover {
        background: rgba(18, 20, 32, 0.58);
        transform: translateY(-1px);
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }
    </style>
    <script type="module" crossorigin src="/aperture/showcase/platformer/assets/index-B0pBy5Hp.js"></script>
  </head>
  <body>
    <canvas id="aperture"></canvas>
    <div id="hud">
      <img src="./sprites/coin.png" alt="" />
      <span class="x">×</span>
      <span id="coins">0</span>
    </div>
    <a
      id="engine-badge"
      href="https://github.com/felixtrz/aperture"
      target="_blank"
      rel="noopener"
    >
      <img class="badge-logo" src="/aperture/showcase/platformer/aperture.svg" alt="" />
      <span>Built with Aperture</span>
    </a>
</body>
</html>
