<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Racing — Aperture</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #aperture {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      #lap-timer {
        position: absolute;
        top: 12px;
        left: 12px;
        color: #fff;
        font:
          600 13px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px 14px;
        border-radius: 10px;
        line-height: 1.4;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        user-select: none;
        pointer-events: none;
        z-index: 10;
        min-width: 140px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      #lap-timer .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      #lap-timer .label {
        opacity: 0.65;
        font-weight: 500;
        letter-spacing: 0.06em;
      }
      #lap-timer .current {
        font:
          700 24px/1.1 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-variant-numeric: tabular-nums;
        margin: 4px 0 6px;
      }
      #lap-timer .stat {
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        opacity: 0.9;
      }

      .corner-link {
        position: absolute;
        color: #1f2430;
        font:
          400 13px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.92);
        padding: 9px 18px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
        z-index: 10;
      }
      #engine-badge {
        bottom: 12px;
        right: 12px;
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>
    <div id="lap-timer">
      <div class="row"><span class="label">LAP</span><span class="lap">1</span></div>
      <div class="current">0:00.00</div>
      <div class="row stat">
        <span class="label">LAST</span><span class="last">0:00.00</span>
      </div>
      <div class="row stat">
        <span class="label">BEST</span><span class="best">0:00.00</span>
      </div>
    </div>
    <a id="engine-badge" class="corner-link" href="https://github.com/felixtrz/aperture"
      >Built with Aperture</a
    >
    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
