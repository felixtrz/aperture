<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture GPU Profiler</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@aperture-engine/render": "/packages/render/dist/index.js",
          "@aperture-engine/runtime": "/packages/runtime/dist/index.js",
          "@aperture-engine/physics": "/packages/physics/dist/index.js",
          "@aperture-engine/simulation": "/packages/simulation/dist/index.js",
          "@aperture-engine/webgpu": "/packages/webgpu/dist/index.js",
          "@aperture-engine/webgpu/test-support": "/packages/webgpu/dist/test-support.js",
          "elics": "/node_modules/elics/lib/index.js",
          "wgpu-matrix": "/node_modules/wgpu-matrix/dist/3.x/wgpu-matrix.module.js",
          "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs"
        }
      }
    </script>
    <script type="module" src="./example-control.js"></script>
  </head>
  <body>
    <main class="runtime-shell">
      <section class="viewport-panel" aria-label="Aperture GPU profiler scene">
        <canvas
          id="aperture-canvas"
          width="1280"
          height="720"
          aria-label="Aperture WebGPU GPU profiler canvas"
        ></canvas>
        <div
          id="gpu-profiler-overlay"
          class="gpu-profiler-overlay"
          aria-label="GPU pass timings"
        >
          <div class="gpu-profiler-header">
            <span>GPU timings</span>
            <strong id="gpu-profiler-frame">frame 0</strong>
          </div>
          <ol id="gpu-profiler-pass-list" class="gpu-profiler-pass-list"></ol>
          <div class="gpu-profiler-header">
            <span>CPU phases</span>
            <strong id="gpu-profiler-phase-frame">frame 0</strong>
          </div>
          <ol id="gpu-profiler-phase-list" class="gpu-profiler-pass-list"></ol>
        </div>
      </section>
      <aside class="status-panel" aria-label="Runtime status">
        <div class="status-row">
          <span>example</span>
          <strong id="example-name">gpu profiler</strong>
        </div>
        <div class="status-row">
          <span>state</span>
          <strong id="example-state">loading</strong>
        </div>
        <nav class="example-links" aria-label="Examples">
          <a href="/">clear</a>
          <a href="/examples/triangle.html">triangle</a>
          <a href="/examples/multi-entity.html">multi entity</a>
          <a href="/examples/spinning-cube.html">spinning cube</a>
          <a href="/examples/render-to-texture.html">render texture</a>
          <a href="/examples/render-target-resize.html">target resize</a>
          <a href="/examples/gpu-profiler.html">gpu profiler</a>
          <a href="/examples/matcap-app.html">matcap app</a>
          <a href="/examples/materials-showcase.html">materials</a>
          <a href="/examples/gltf-scene.html">gltf scene</a>
          <a href="/examples/point-shadow.html">point shadow</a>
          <a href="/examples/spot-shadow.html">spot shadow</a>
          <a href="/examples/app-diagnostics.html">diagnostics</a>
        </nav>
        <pre id="example-json">{}</pre>
      </aside>
    </main>
    <script type="module" src="./gpu-profiler.main.js"></script>
  </body>
</html>
