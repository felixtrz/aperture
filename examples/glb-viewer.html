<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture GLB Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@aperture-engine/core": "/packages/core/dist/index.js",
          "@aperture-engine/render": "/packages/render/dist/index.js",
          "@aperture-engine/runtime": "/packages/runtime/dist/index.js",
          "@aperture-engine/simulation": "/packages/simulation/dist/index.js",
          "@aperture-engine/webgpu": "/packages/webgpu/dist/index.js",
          "elics": "/node_modules/elics/lib/index.js",
          "wgpu-matrix": "/node_modules/wgpu-matrix/dist/3.x/wgpu-matrix.module.js",
          "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main class="runtime-shell">
      <section class="viewport-panel" aria-label="Aperture GLB viewer">
        <canvas
          id="aperture-canvas"
          width="1280"
          height="720"
          aria-label="Aperture WebGPU GLB viewer canvas"
        ></canvas>
      </section>
      <aside class="status-panel" aria-label="Runtime status">
        <div class="status-row">
          <span>example</span>
          <strong id="example-name">glb viewer</strong>
        </div>
        <div class="status-row">
          <span>state</span>
          <strong id="example-state">loading</strong>
        </div>
        <label class="asset-select-row" for="glb-asset-select">
          <span>asset</span>
          <select id="glb-asset-select" aria-label="GLB sample asset"></select>
        </label>
        <form class="asset-url-row" id="glb-url-form">
          <label for="glb-url-input">url</label>
          <div class="asset-url-controls">
            <input
              id="glb-url-input"
              name="glb-url"
              autocomplete="off"
              inputmode="url"
              placeholder="/examples/assets/cube.glb"
              aria-label="Custom GLB URL"
            />
            <button type="submit">load</button>
          </div>
        </form>
        <div class="runtime-controls glb-viewer-controls" aria-label="Camera">
          <button
            id="glb-camera-reset"
            type="button"
            title="Reset camera to the current asset fit"
          >
            home
          </button>
        </div>
        <div class="light-control-grid" aria-label="Lighting">
          <label for="glb-point-light-intensity">
            <span>point</span>
            <input
              id="glb-point-light-intensity"
              type="range"
              min="0"
              max="36"
              step="1"
              value="18"
              aria-label="Point light intensity"
            />
          </label>
          <label for="glb-ambient-intensity">
            <span>ambient</span>
            <input
              id="glb-ambient-intensity"
              type="range"
              min="0"
              max="1"
              step="0.02"
              value="0.24"
              aria-label="Ambient light intensity"
            />
          </label>
        </div>
        <nav class="example-links" aria-label="Examples">
          <a href="/">clear</a>
          <a href="/examples/triangle.html">triangle</a>
          <a href="/examples/multi-entity.html">multi entity</a>
          <a href="/examples/spinning-cube.html">spinning cube</a>
          <a href="/examples/matcap-app.html">matcap app</a>
          <a href="/examples/materials-showcase.html">materials</a>
          <a href="/examples/gltf-scene.html">gltf scene</a>
          <a href="/examples/glb-viewer.html">glb viewer</a>
          <a href="/examples/standard-texture-control.html">standard texture</a>
          <a href="/examples/app-diagnostics.html">diagnostics</a>
        </nav>
        <pre id="example-json">{}</pre>
      </aside>
    </main>
    <script type="module" src="./glb-viewer.js"></script>
  </body>
</html>
