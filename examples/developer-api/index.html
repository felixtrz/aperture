<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture Developer API</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #101417;
        color: #edf3f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        grid-template-columns: minmax(360px, 1fr) minmax(320px, 420px);
        gap: 16px;
        min-height: 100vh;
        margin: 0;
        padding: 16px;
      }

      #aperture {
        width: 100%;
        min-height: min(70vh, 720px);
        border: 1px solid #27323a;
        border-radius: 8px;
        background: #08090a;
      }

      .developer-panel {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        min-height: 0;
        border: 1px solid #27323a;
        border-radius: 8px;
        background: #171d21;
      }

      .developer-panel__controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid #27323a;
      }

      .developer-panel button {
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid #3b4a54;
        border-radius: 6px;
        background: #22303a;
        color: #edf3f7;
        font: inherit;
        cursor: pointer;
      }

      .developer-panel input {
        min-width: 0;
        min-height: 34px;
        flex: 1 1 160px;
        padding: 0 10px;
        border: 1px solid #3b4a54;
        border-radius: 6px;
        background: #10171c;
        color: #edf3f7;
        font: inherit;
      }

      .developer-panel button:hover {
        border-color: #5f798b;
        background: #2a3a46;
      }

      #aperture-dev-status {
        min-height: 0;
        margin: 0;
        overflow: auto;
        padding: 12px;
        color: #cfe0ea;
        font:
          12px/1.45 "JetBrains Mono",
          "SF Mono",
          Menlo,
          Consolas,
          monospace;
        white-space: pre-wrap;
      }

      @media (max-width: 820px) {
        body {
          grid-template-columns: 1fr;
        }

        #aperture {
          min-height: 52vh;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>
    <aside class="developer-panel" aria-label="Aperture developer status">
      <div class="developer-panel__controls">
        <button type="button" data-aperture-action="select">Select</button>
        <button type="button" data-aperture-action="snapshot">Snapshot</button>
        <button type="button" data-aperture-action="diff">Diff</button>
        <button type="button" data-aperture-action="find-crate">
          Find crate
        </button>
        <button type="button" data-aperture-action="get-entity">Get</button>
        <input
          type="text"
          data-aperture-note-input
          value="panel.note"
          aria-label="Debug note"
        />
        <button type="button" data-aperture-action="set-note">Set note</button>
        <button type="button" data-aperture-action="request-decal">
          Request decal
        </button>
        <button type="button" data-aperture-action="invalid-command">
          Invalid command
        </button>
      </div>
      <pre id="aperture-dev-status" aria-live="polite">{}</pre>
    </aside>
    <script type="module" src="/src/dev-panel.ts"></script>
  </body>
</html>
