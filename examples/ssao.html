<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture SSAO</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@aperture-engine/render": "/packages/render/dist/index.js",
          "@aperture-engine/runtime": "/packages/runtime/dist/index.js",
          "@aperture-engine/physics": "/packages/physics/dist/index.js",
          "@aperture-engine/particles": "/packages/particles/dist/index.js",
          "@aperture-engine/math": "/packages/math/dist/index.js",
          "@aperture-engine/simulation": "/packages/simulation/dist/index.js",
          "@aperture-engine/webgpu": "/packages/webgpu/dist/index.js",
          "@aperture-engine/webgpu/test-support": "/packages/webgpu/dist/test-support.js",
          "elics": "/node_modules/elics/lib/index.js",
          "wgpu-matrix": "/node_modules/wgpu-matrix/dist/3.x/wgpu-matrix.module.js",
          "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs"
        }
      }
    </script>
    <script type="module" src="./example-control.js"></script>
  </head>
  <body>
    <main class="runtime-shell">
      <section
        class="viewport-panel msaa-viewport-grid"
        aria-label="Aperture SSAO comparison"
      >
        <figure class="msaa-canvas-frame">
          <canvas
            id="ssao-canvas-raw"
            class="msaa-canvas"
            width="512"
            height="512"
            aria-label="Aperture WebGPU raw canvas"
          ></canvas>
          <figcaption>raw</figcaption>
        </figure>
        <figure class="msaa-canvas-frame">
          <canvas
            id="ssao-canvas-ssao"
            class="msaa-canvas"
            width="512"
            height="512"
            aria-label="Aperture WebGPU SSAO canvas"
          ></canvas>
          <figcaption>SSAO</figcaption>
        </figure>
      </section>
      <aside class="status-panel" aria-label="Runtime status">
        <div class="status-row">
          <span>example</span>
          <strong id="example-name">ssao</strong>
        </div>
        <div class="status-row">
          <span>state</span>
          <strong id="example-state">loading</strong>
        </div>
        <nav class="example-links" aria-label="Examples">
          <a href="/">clear</a>
          <a href="/examples/post-effects.html">post effects</a>
          <a href="/examples/msaa.html">msaa</a>
          <a href="/examples/taa.html">taa</a>
          <a href="/examples/ssao.html">ssao</a>
          <a href="/examples/ssr.html">ssr</a>
          <a href="/examples/dof.html">dof</a>
          <a href="/examples/atmosphere.html">atmosphere</a>
          <a href="/examples/glb-viewer.html">glb viewer</a>
        </nav>
        <pre id="example-json">{}</pre>
      </aside>
    </main>
    <script type="module" src="./ssao.main.js"></script>
  </body>
</html>
