<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture Tonemap Showcase</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@aperture-engine/core": "/packages/core/dist/index.js",
          "@aperture-engine/render": "/packages/render/dist/index.js",
          "@aperture-engine/runtime": "/packages/runtime/dist/index.js",
          "@aperture-engine/simulation": "/packages/simulation/dist/index.js",
          "@aperture-engine/webgpu": "/packages/webgpu/dist/index.js",
          "elics": "/node_modules/elics/lib/index.js",
          "wgpu-matrix": "/node_modules/wgpu-matrix/dist/3.x/wgpu-matrix.module.js",
          "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main class="runtime-shell">
      <section
        class="viewport-panel"
        aria-label="Aperture tonemap showcase runtime"
      >
        <canvas
          id="aperture-canvas"
          width="960"
          height="540"
          aria-label="Aperture WebGPU tonemap showcase canvas"
        ></canvas>
      </section>
      <aside class="status-panel" aria-label="Runtime status">
        <div class="status-row">
          <span>example</span>
          <strong id="example-name">tonemap showcase</strong>
        </div>
        <div class="status-row">
          <span>operator</span>
          <strong id="example-state">loading</strong>
        </div>
        <div class="runtime-controls" aria-label="Tonemap operators">
          <button type="button" data-tonemap="linear">Linear</button>
          <button type="button" data-tonemap="reinhard">Reinhard</button>
          <button type="button" data-tonemap="aces">ACES</button>
          <button type="button" data-tonemap="agx">AgX</button>
        </div>
        <nav class="example-links" aria-label="Examples">
          <a href="/">clear</a>
          <a href="/examples/spinning-cube.html">spinning cube</a>
          <a href="/examples/tonemap-showcase.html">tonemap showcase</a>
          <a href="/examples/materials-showcase.html">materials</a>
          <a href="/examples/glb-viewer.html">glb viewer</a>
        </nav>
        <pre id="example-json">{}</pre>
      </aside>
    </main>
    <script type="module" src="./tonemap-showcase.main.js"></script>
  </body>
</html>
