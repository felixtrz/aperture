<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture Browser Harness</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "elics": "/node_modules/elics/lib/index.js",
          "wgpu-matrix": "/node_modules/wgpu-matrix/dist/3.x/wgpu-matrix.module.js",
          "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main class="runtime-shell">
      <section class="viewport-panel" aria-label="Aperture browser runtime">
        <canvas
          id="aperture-canvas"
          width="960"
          height="540"
          aria-label="Aperture WebGPU canvas"
        ></canvas>
      </section>
      <aside class="status-panel" aria-label="Runtime status">
        <div class="status-row">
          <span>example</span>
          <strong id="example-name">webgpu clear</strong>
        </div>
        <div class="status-row">
          <span>state</span>
          <strong id="example-state">loading</strong>
        </div>
        <pre id="example-json">{}</pre>
      </aside>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
