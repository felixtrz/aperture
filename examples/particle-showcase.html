<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture Particle Showcase</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@aperture-engine/app": "/packages/app/dist/index.js",
          "@aperture-engine/app/browser": "/packages/app/dist/browser.js",
          "@aperture-engine/app/config": "/packages/app/dist/config.js",
          "@aperture-engine/app/systems": "/packages/app/dist/systems.js",
          "@aperture-engine/app/worker": "/packages/app/dist/worker.js",
          "@aperture-engine/render": "/packages/render/dist/index.js",
          "@aperture-engine/runtime": "/packages/runtime/dist/index.js",
          "@aperture-engine/physics": "/packages/physics/dist/index.js",
          "@aperture-engine/particles": "/packages/particles/dist/index.js",
          "@aperture-engine/math": "/packages/math/dist/index.js",
          "@aperture-engine/simulation": "/packages/simulation/dist/index.js",
          "@aperture-engine/webgpu": "/packages/webgpu/dist/index.js",
          "@aperture-engine/webgpu/test-support": "/packages/webgpu/dist/test-support.js",
          "elics": "/node_modules/elics/lib/index.js",
          "wgpu-matrix": "/node_modules/wgpu-matrix/dist/3.x/wgpu-matrix.module.js",
          "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs"
        }
      }
    </script>
    <script type="module" src="./example-control.js"></script>
  </head>
  <body>
    <main class="runtime-shell">
      <section class="viewport-panel" aria-label="Aperture particle showcase">
        <canvas
          id="aperture-canvas"
          width="1280"
          height="720"
          aria-label="Aperture WebGPU particle showcase canvas"
        ></canvas>
      </section>
      <aside class="status-panel" aria-label="Runtime status">
        <div class="status-row">
          <span>example</span>
          <strong id="example-name">particle showcase</strong>
        </div>
        <div class="status-row">
          <span>state</span>
          <strong id="example-state">loading</strong>
        </div>
        <nav class="example-links" aria-label="Examples">
          <a href="/">clear</a>
          <a href="/examples/gpu-particles.html">gpu particles</a>
          <a href="/examples/particle-bursts.html">particle bursts</a>
          <a href="/examples/particle-showcase.html">particle showcase</a>
          <a href="/examples/post-effects.html">post effects</a>
          <a href="/examples/content-showcase.html">content showcase</a>
        </nav>
        <pre id="example-json">{}</pre>
      </aside>
    </main>
    <script type="module" src="./particle-showcase.main.js"></script>
  </body>
</html>
