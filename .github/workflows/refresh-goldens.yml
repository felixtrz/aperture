# Regenerate the golden-image baselines under the canonical CI renderer
# (SwiftShader + headed Chrome under xvfb) and commit the refreshed PNGs back
# to the dispatching branch. Goldens can only be produced in this environment
# (docs/RENDER_CONTROL.md), so intentional rendering changes refresh them here
# rather than from a developer machine.
name: Refresh golden baselines

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Install Chrome + system deps
        run: pnpm exec playwright install --with-deps chrome

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Regenerate golden baselines
        run: |
          CI=true xvfb-run -a pnpm exec playwright test \
            --config=playwright.ci.config.ts test/e2e/golden-baselines.spec.ts \
            --update-snapshots

      - name: Commit refreshed snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test/e2e/golden-baselines.spec.ts-snapshots
          if git diff --cached --quiet; then
            echo "No golden changes."
          else
            git commit -m "chore(test): refresh golden baselines under the CI renderer"
            git push
          fi
