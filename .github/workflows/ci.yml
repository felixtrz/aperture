name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Workspace check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # pnpm must exist BEFORE setup-node, since setup-node's `cache: pnpm`
      # resolves the pnpm store path by invoking pnpm.
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace check
        run: pnpm run check

      - name: Run dead-code report (non-blocking)
        continue-on-error: true
        run: pnpm run check:deadcode

      # AI-76: report per-scale render-pipeline timings; the gating budget
      # assertions run inside `pnpm test` (extraction-budget.test.ts).
      - name: Run bench report (non-blocking)
        continue-on-error: true
        run: pnpm run bench

  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # test/index.test.ts asserts package export targets resolve to built
      # dist files, so the suite needs a build even under coverage.
      - name: Build packages
        run: pnpm run build

      # AI-77: fails when coverage drops below the thresholds documented in
      # vitest.config.ts (set just below measured reality; ratchet up only).
      - name: Run tests with coverage thresholds
        run: pnpm run test:coverage

  shader-compile-gate:
    name: WebGPU shader-compile gate (Dawn)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The check script imports composed family shaders from built dist.
      - name: Build packages
        run: pnpm run build

      - name: Install Chrome + system deps
        run: pnpm exec playwright install --with-deps chrome

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # AI-17: compiles all 37 composed output-stage family shaders in real
      # Dawn and pins the none+linear byte-identity invariant.
      # APERTURE_REQUIRE_WEBGPU=1 makes a missing adapter a hard failure (no
      # silent skip in CI).
      - name: WebGPU shader-compile gate (Dawn)
        run: xvfb-run -a pnpm run test:shaders
        env:
          APERTURE_REQUIRE_WEBGPU: "1"
          APERTURE_WEBGPU_CHANNEL: chrome

  e2e:
    name: WebGPU E2E (SwiftShader, shard ${{ matrix.shard }}/8)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      # Google Chrome + its system libs (channel "chrome" → real Chrome, which
      # exposes navigator.gpu under SwiftShader Vulkan; headless Chromium hides it).
      # The chromium headless shell is additionally required by the CLI dev
      # daemon (`aperture dev up --headless`) exercised in cli-ai-tools.spec.ts.
      - name: Install Chrome + system deps
        run: pnpm exec playwright install --with-deps chrome chromium

      # xvfb provides the display a non-headless Chrome needs for a GPU context.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # The FULL e2e suite, sharded across the job matrix (AI-71). Environment
      # exclusions live in ONE place: playwright.ci.config.ts testIgnore, each
      # with a documented reason. Do not re-introduce per-spec lists here.
      - name: Run WebGPU E2E (SwiftShader under xvfb)
        run: |
          xvfb-run -a pnpm exec playwright test \
            --config=playwright.ci.config.ts \
            --shard=${{ matrix.shard }}/8

      # AI-75: every skipped test must carry a documented environment-capability
      # reason; an unexplained skip fails the shard naming the spec.
      - name: Gate unexpected skips
        run: node scripts/check-e2e-skips.mjs test-results/playwright-ci-report.json

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webgpu-e2e-results-shard-${{ matrix.shard }}
          path: test-results/playwright-ci
          retention-days: 7
