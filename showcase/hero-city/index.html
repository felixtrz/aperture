<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Aperture — the agent-first 3D engine</title>
    <link rel="icon" type="image/svg+xml" href="/aperture.svg" />
    <style>
      :root {
        color-scheme: dark;
        --ui:
          600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --glass: rgba(12, 16, 22, 0.5);
        --hairline: rgba(255, 255, 255, 0.1);
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0c0f14;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #aperture {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      /* --- top nav ---------------------------------------------------- */
      #nav {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        color: #fff;
        pointer-events: none;
      }
      #nav .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 17px;
        letter-spacing: 0.01em;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      }
      #nav .brand img {
        width: 22px;
        height: 22px;
      }
      #nav .links {
        display: inline-flex;
        gap: 8px;
        pointer-events: auto;
      }
      #nav .links a {
        color: #fff;
        text-decoration: none;
        font: var(--ui);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid transparent;
        opacity: 0.85;
        transition:
          background 0.16s ease,
          opacity 0.16s ease,
          border-color 0.16s ease;
      }
      #nav .links a:hover {
        opacity: 1;
        background: var(--glass);
        border-color: var(--hairline);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      /* --- info panel ------------------------------------------------- */
      #info {
        position: absolute;
        left: 24px;
        bottom: 28px;
        z-index: 10;
        max-width: 380px;
        padding: 22px 24px;
        color: #fff;
        background: var(--glass);
        border: 1px solid var(--hairline);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        pointer-events: none;
        user-select: none;
      }
      #info .eyebrow {
        font: var(--ui);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 11px;
        opacity: 0.6;
        margin-bottom: 10px;
      }
      #info h1 {
        margin: 0 0 10px;
        font-size: 30px;
        line-height: 1.1;
        letter-spacing: -0.01em;
        font-weight: 700;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
      #info p {
        margin: 0;
        font-size: 14px;
        line-height: 1.55;
        opacity: 0.82;
      }

      /* --- engine badge ---------------------------------------------- */
      #engine-badge {
        position: absolute;
        bottom: 14px;
        right: 14px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: #fff;
        font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        text-decoration: none;
        background: rgba(18, 20, 32, 0.42);
        padding: 8px 15px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px) saturate(140%);
        -webkit-backdrop-filter: blur(8px) saturate(140%);
        z-index: 10;
        transition:
          background 0.16s ease,
          transform 0.16s ease;
      }
      #engine-badge:hover {
        background: rgba(18, 20, 32, 0.58);
        transform: translateY(-1px);
      }
      #engine-badge img {
        width: 14px;
        height: 14px;
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>

    <nav id="nav">
      <span class="brand">
        <img src="/aperture.svg" alt="" />
        Aperture
      </span>
      <span class="links">
        <a href="https://github.com/felixtrz/aperture#readme">Docs</a>
        <a href="https://github.com/felixtrz/aperture/tree/main/showcase"
          >Examples</a
        >
        <a href="https://github.com/felixtrz/aperture">GitHub</a>
      </span>
    </nav>

    <div id="info">
      <div class="eyebrow">WebGPU · ECS-native · multithreaded</div>
      <h1>The agent-first 3D engine</h1>
      <p>
        One architectural bet — ECS is the source of truth, rendering is a
        derived view. This whole town is pure data simulated off the main
        thread.
      </p>
    </div>

    <a
      id="engine-badge"
      href="https://github.com/felixtrz/aperture"
      target="_blank"
      rel="noopener"
    >
      <img src="/aperture.svg" alt="" />
      <span>Built with Aperture</span>
    </a>
  </body>
</html>
