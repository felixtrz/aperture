<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starter Kit FPS - Aperture</title>
    <link rel="icon" type="image/svg+xml" href="/aperture.svg" />
    <style>
      @font-face {
        font-family: "Lilita One";
        src: url("/fonts/lilita_one_regular.ttf") format("truetype");
        font-weight: 400;
      }

      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #5c6476;
      }

      #game-shell {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #5c6476;
      }

      #aperture {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        touch-action: none;
      }

      #crosshair {
        position: absolute;
        left: 50%;
        top: 50%;
        width: var(--fps-crosshair-size, 44.8px);
        height: var(--fps-crosshair-size, 44.8px);
        transform: translate(-50%, -50%);
        image-rendering: pixelated;
        pointer-events: none;
        z-index: 4;
      }

      #hud {
        position: absolute;
        left: var(--fps-health-left, 48px);
        bottom: var(--fps-health-bottom, 48px);
        color: white;
        font:
          400 var(--fps-health-font-size, 36px) /
            var(--fps-health-line-height, 45px) "Lilita One",
          system-ui,
          sans-serif;
        -webkit-text-stroke: var(--fps-health-outline-size, 12px)
          rgba(0, 0, 0, var(--fps-health-outline-alpha, 0.470588));
        paint-order: stroke fill;
        user-select: none;
        pointer-events: none;
        z-index: 5;
      }

      #health {
        min-width: var(--fps-health-width, 90px);
      }

      #engine-badge {
        position: absolute;
        bottom: 14px;
        right: 14px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: #fff;
        font:
          600 12px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0.02em;
        text-decoration: none;
        background: rgba(18, 20, 32, 0.42);
        padding: 8px 15px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px) saturate(140%);
        -webkit-backdrop-filter: blur(8px) saturate(140%);
        z-index: 10;
        transition:
          background 0.16s ease,
          transform 0.16s ease,
          box-shadow 0.16s ease;
      }
      #engine-badge .badge-logo {
        width: 14px;
        height: 14px;
        display: block;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.45));
      }
      #engine-badge:hover {
        background: rgba(18, 20, 32, 0.58);
        transform: translateY(-1px);
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }
    </style>
  </head>
  <body>
    <div id="game-shell">
      <canvas id="aperture"></canvas>
      <img id="crosshair" src="./sprites/crosshair.png" alt="" />
      <div id="hud">
        <div id="health">100%</div>
      </div>
      <a
        id="engine-badge"
        href="https://github.com/felixtrz/aperture"
        target="_blank"
        rel="noopener"
      >
        <img class="badge-logo" src="/aperture.svg" alt="" />
        <span>Built with Aperture</span>
      </a>
    </div>
    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
