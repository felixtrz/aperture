<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shadow Lab — Racing Static Scene</title>
    <script>
      // Opt this page into the engine's in-browser devtools runtime. The
      // generated boot calls installGeneratedDevtoolsRuntime() when devtools are
      // enabled (dev mode), but it only publishes window.__APERTURE_MCP_RUNTIME__
      // when this flag is already true. The MCP launcher sets it; we set it here
      // so the debug panel works in any plain dev tab too. Must run before the
      // auto-injected app bootstrap module.
      window.__APERTURE_MCP_MANAGED__ = true;
    </script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #aperture {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      #lap-timer {
        position: absolute;
        top: 12px;
        left: 12px;
        color: #fff;
        font:
          600 13px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px 14px;
        border-radius: 10px;
        line-height: 1.4;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        user-select: none;
        pointer-events: none;
        z-index: 10;
        min-width: 140px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      #lap-timer .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      #lap-timer .label {
        opacity: 0.65;
        font-weight: 500;
        letter-spacing: 0.06em;
      }
      #lap-timer .current {
        font:
          700 24px/1.1 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-variant-numeric: tabular-nums;
        margin: 4px 0 6px;
      }
      #lap-timer .stat {
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        opacity: 0.9;
      }
      .shadow-lab-compare #lap-timer {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>
    <div id="lap-timer">
      <div class="row">
        <span class="label">LAP</span><span class="lap">1</span>
      </div>
      <div class="current">0:00.00</div>
      <div class="row stat">
        <span class="label">LAST</span><span class="last">0:00.00</span>
      </div>
      <div class="row stat">
        <span class="label">BEST</span><span class="best">0:09.12</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
