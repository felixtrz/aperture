<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>City Builder — Aperture</title>
    <link rel="icon" href="data:," />
    <style>
      @font-face {
        font-family: "Lilita One";
        src: url("/fonts/lilita_one_regular.ttf") format("truetype");
        font-display: swap;
      }
      :root {
        color-scheme: dark;
        --ui:
          600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0c0f14;
      }
      #aperture {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: crosshair;
      }
      .panel {
        position: absolute;
        z-index: 10;
        pointer-events: none;
        user-select: none;
        color: #fff;
        background: rgba(12, 16, 22, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      #cash {
        top: 14px;
        left: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px 10px 12px;
      }
      #cash img {
        width: 34px;
        height: 34px;
        image-rendering: auto;
      }
      #cash .amount {
        font-family: "Lilita One", sans-serif;
        font-size: 28px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }
      #cash .amount.negative {
        color: #ff6b6b;
      }
      #selection {
        top: 14px;
        right: 14px;
        padding: 12px 16px;
        text-align: right;
        min-width: 150px;
        font: var(--ui);
      }
      #selection .name {
        font-family: "Lilita One", sans-serif;
        font-size: 20px;
      }
      #selection .meta {
        opacity: 0.7;
        font-size: 12px;
        margin-top: 4px;
        font-variant-numeric: tabular-nums;
      }
      #controls {
        bottom: 14px;
        left: 14px;
        padding: 12px 16px;
        font: var(--ui);
        line-height: 1.7;
        opacity: 0.92;
        max-width: 280px;
      }
      #controls b {
        display: inline-block;
        min-width: 96px;
        opacity: 0.65;
        font-weight: 600;
      }
      kbd {
        background: rgba(255, 255, 255, 0.14);
        border-radius: 5px;
        padding: 1px 6px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
      }
      .corner-link {
        position: absolute;
        bottom: 14px;
        right: 14px;
        z-index: 10;
        color: #1f2430;
        font:
          400 13px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.92);
        padding: 9px 18px;
        border-radius: 999px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>

    <div id="cash" class="panel">
      <img src="/sprites/coin.png" alt="cash" />
      <span class="amount">$10,000</span>
    </div>

    <div id="selection" class="panel">
      <div class="name">Road</div>
      <div class="meta">$25 · 0 placed</div>
    </div>

    <div id="controls" class="panel">
      <div>
        <b>Move</b> <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> ·
        <kbd>F</kbd> center
      </div>
      <div><b>Build / Demolish</b> <kbd>L-Click</kbd> / <kbd>Del</kbd></div>
      <div><b>Rotate piece</b> <kbd>R-Click</kbd></div>
      <div><b>Cycle piece</b> <kbd>Q</kbd> <kbd>E</kbd></div>
      <div><b>Orbit</b> <kbd>M-Drag</kbd></div>
      <div><b>Zoom</b> <kbd>Wheel</kbd> / <kbd>+</kbd> <kbd>−</kbd></div>
      <div><b>Clear city</b> <kbd>R</kbd></div>
    </div>

    <a class="corner-link" href="https://github.com/felixtrz/aperture"
      >Built with Aperture</a
    >

    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
