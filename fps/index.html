<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starter Kit FPS - Aperture</title>
    <link rel="icon" href="/icon.png" />
    <style>
      @font-face {
        font-family: "Lilita One";
        src: url("/fonts/lilita_one_regular.ttf") format("truetype");
        font-weight: 400;
      }

      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--fps-boot-splash-background, #ececf5);
      }

      #game-shell {
        position: fixed;
        inset: 0;
        width: min(
          100vw,
          calc(100vh * var(--fps-source-viewport-aspect, 1.7777777778)),
          var(--fps-source-viewport-width, 1280px)
        );
        height: min(
          100vh,
          calc(100vw / var(--fps-source-viewport-aspect, 1.7777777778)),
          var(--fps-source-viewport-height, 720px)
        );
        margin: auto;
        overflow: hidden;
        background: #5c6476;
        aspect-ratio: var(--fps-source-viewport-aspect-ratio, 16 / 9);
      }

      #aperture {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        touch-action: none;
      }

      #crosshair {
        position: absolute;
        left: 50%;
        top: 50%;
        width: var(--fps-crosshair-size, 44.8px);
        height: var(--fps-crosshair-size, 44.8px);
        transform: translate(-50%, -50%);
        image-rendering: pixelated;
        pointer-events: none;
        z-index: 4;
      }

      #hud {
        position: absolute;
        left: var(--fps-health-left, 48px);
        bottom: var(--fps-health-bottom, 48px);
        color: white;
        font:
          400 var(--fps-health-font-size, 36px) /
            var(--fps-health-line-height, 45px) "Lilita One",
          system-ui,
          sans-serif;
        -webkit-text-stroke: var(--fps-health-outline-size, 12px)
          rgba(0, 0, 0, var(--fps-health-outline-alpha, 0.470588));
        paint-order: stroke fill;
        user-select: none;
        pointer-events: none;
        z-index: 5;
      }

      #health {
        min-width: var(--fps-health-width, 90px);
      }

      #boot-splash {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--fps-boot-splash-background, #ececf5);
        pointer-events: none;
        z-index: 10;
        transition:
          opacity 160ms ease,
          visibility 0ms linear 160ms;
      }

      #boot-splash img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #game-shell.boot-complete #boot-splash {
        visibility: hidden;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="game-shell">
      <canvas id="aperture"></canvas>
      <img id="crosshair" src="/sprites/crosshair.png" alt="" />
      <div id="hud">
        <div id="health">100%</div>
      </div>
      <div id="boot-splash" aria-hidden="true">
        <img src="/splash-screen.png" alt="" />
      </div>
    </div>
    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
