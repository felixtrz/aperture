<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starter Kit FPS - Aperture</title>
    <link rel="icon" href="data:," />
    <style>
      @font-face {
        font-family: "Lilita One";
        src: url("/fonts/lilita_one_regular.ttf") format("truetype");
        font-weight: 400;
      }

      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #5c6476;
      }

      #aperture {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 45px;
        height: 45px;
        transform: translate(-50%, -50%);
        image-rendering: pixelated;
        pointer-events: none;
        z-index: 4;
      }

      #hud {
        position: fixed;
        left: 48px;
        bottom: 28px;
        color: white;
        font:
          400 clamp(40px, 7vw, 72px) / 1 "Lilita One",
          system-ui,
          sans-serif;
        text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
        user-select: none;
        pointer-events: none;
        z-index: 5;
      }

      #health {
        min-width: 110px;
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>
    <img id="crosshair" src="/sprites/crosshair.png" alt="" />
    <div id="hud">
      <div id="health">100%</div>
    </div>
    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
