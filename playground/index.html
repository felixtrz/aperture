<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aperture Platformer Playground</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #79bde8;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 34%),
          #79bde8;
      }

      #aperture {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      .hud {
        position: fixed;
        inset: 16px 16px auto 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
        color: white;
        text-shadow: 0 2px 10px rgba(14, 44, 68, 0.4);
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 8px;
        background: rgba(16, 54, 78, 0.52);
        backdrop-filter: blur(10px);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .message {
        max-width: min(520px, 48vw);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .controls {
        position: fixed;
        inset: auto 16px 16px 16px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
      }

      .cluster {
        display: flex;
        gap: 10px;
        pointer-events: auto;
      }

      button {
        width: 58px;
        height: 58px;
        border: 1px solid rgba(255, 255, 255, 0.36);
        border-radius: 8px;
        color: #fff;
        background: rgba(18, 61, 87, 0.62);
        box-shadow: 0 10px 26px rgba(0, 36, 56, 0.22);
        font: inherit;
        font-size: 22px;
        font-weight: 800;
        touch-action: none;
      }

      button:active {
        transform: translateY(1px);
        background: rgba(25, 96, 130, 0.76);
      }

      body[data-game-state="clear"] .message {
        color: #ffec93;
      }

      @media (max-width: 700px) {
        .hud {
          align-items: flex-start;
          flex-direction: column;
        }

        .message {
          max-width: calc(100vw - 32px);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>
    <div class="hud" aria-live="polite">
      <div class="stats">
        <span class="pill"
          >Gems <span id="gems">0</span>/<span id="total-gems">0</span></span
        >
        <span class="pill">Time <span id="run-time">0.0</span>s</span>
        <span class="pill">Falls <span id="deaths">0</span></span>
        <span class="pill">State <span id="run-state">Run</span></span>
      </div>
      <div class="pill message" id="message">
        Collect every gem and reach the flag
      </div>
    </div>
    <div class="controls" aria-label="Touch controls">
      <div class="cluster">
        <button
          type="button"
          data-action="move"
          data-x="-1"
          aria-label="Move left"
        >
          ←
        </button>
        <button
          type="button"
          data-action="move"
          data-x="1"
          aria-label="Move right"
        >
          →
        </button>
      </div>
      <div class="cluster">
        <button type="button" data-action="reset" aria-label="Reset">R</button>
        <button type="button" data-action="jump" aria-label="Jump">↑</button>
      </div>
    </div>
    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
