<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Aperture — the agent-first 3D engine</title>
    <link rel="icon" type="image/svg+xml" href="aperture.svg" />
    <style is:global>
      :root {
        color-scheme: dark;
        --ui:
          600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --glass: rgba(8, 11, 16, 0.58);
        --hairline: rgba(255, 255, 255, 0.12);
        --muted: rgba(255, 255, 255, 0.68);
        --hero-desktop-stage-max: 1500px;
        --hero-desktop-side-gutter: 48px;
        --hero-desktop-card-width: 380px;
        --hero-desktop-city-min-width: 550px;
        --hero-desktop-city-panel-gap: 56px;
        --hero-layout-gutter: clamp(16px, 2vw, var(--hero-desktop-side-gutter));
        --hero-layout-gap: clamp(24px, 3vw, var(--hero-desktop-city-panel-gap));
        --hero-stage-center-y: 50%;
        --hero-stage-height: min(760px, calc(100vh - 128px));
        --hero-nav-bottom: 70px;
        --hero-vertical-gap: 0px;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: hidden;
        background:
          linear-gradient(180deg, rgb(71 117 209), rgb(184 128 77)),
          #0c0f14;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        scrollbar-width: none;
      }
      html {
        scrollbar-width: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
      }
      #aperture {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        background:
          linear-gradient(180deg, rgb(71 117 209), rgb(184 128 77)),
          #0c0f14;
        pointer-events: none;
        touch-action: pan-y;
      }
      #hero-stage {
        position: fixed;
        top: var(--hero-stage-center-y);
        left: 50%;
        z-index: 2;
        display: grid;
        width: min(
          var(--hero-desktop-stage-max),
          calc(100vw - var(--hero-layout-gutter) * 2)
        );
        height: var(--hero-stage-height);
        grid-template-columns:
          minmax(0, 1fr)
          min(var(--hero-desktop-card-width), calc(100vw - 48px));
        gap: var(--hero-layout-gap);
        align-items: center;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }
      #landing-city-slot {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        min-width: 0;
        /* Debug slot overlay.
        background: rgba(0, 255, 255, 0.035);
        outline: 2px solid rgba(0, 255, 255, 0.92);
        outline-offset: -2px;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.52),
          0 0 26px rgba(0, 255, 255, 0.22);
        */
        pointer-events: none;
      }

      /* --- top nav ---------------------------------------------------- */
      #nav {
        position: fixed;
        top: 0;
        left: 50%;
        right: auto;
        z-index: 10;
        display: flex;
        width: min(
          calc(100vw - var(--hero-desktop-side-gutter) * 2),
          var(--hero-desktop-stage-max)
        );
        align-items: center;
        justify-content: space-between;
        padding: 18px 0;
        color: #fff;
        pointer-events: none;
        transform: translateX(-50%);
      }
      #nav .nav-top {
        display: contents;
      }
      #nav .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        pointer-events: auto;
      }
      #nav .brand-copy {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      #nav .brand-name {
        font-weight: 700;
        font-size: 17px;
        line-height: 1;
        letter-spacing: 0.01em;
      }
      #nav .brand-tagline {
        max-width: min(38vw, 330px);
        font-size: 12px;
        line-height: 1.15;
        font-weight: 500;
        letter-spacing: 0;
        color: rgba(255, 255, 255, 0.72);
      }
      #nav .brand img {
        width: 22px;
        height: 22px;
      }
      #nav .menu-toggle {
        display: none;
        width: 38px;
        height: 38px;
        place-items: center;
        padding: 0;
        color: #fff;
        background: var(--glass);
        border: 1px solid var(--hairline);
        border-radius: 999px;
        backdrop-filter: blur(12px) saturate(130%);
        -webkit-backdrop-filter: blur(12px) saturate(130%);
        cursor: pointer;
        pointer-events: auto;
      }
      #nav .menu-icon,
      #nav .menu-icon::before,
      #nav .menu-icon::after {
        display: block;
        width: 16px;
        height: 2px;
        background: currentColor;
        border-radius: 999px;
      }
      #nav .menu-icon {
        position: relative;
      }
      #nav .menu-icon::before,
      #nav .menu-icon::after {
        content: "";
        position: absolute;
        left: 0;
      }
      #nav .menu-icon::before {
        top: -5px;
      }
      #nav .menu-icon::after {
        top: 5px;
      }
      #nav .links {
        display: inline-flex;
        gap: 8px;
        pointer-events: auto;
      }
      #nav .links a {
        color: #fff;
        text-decoration: none;
        font: var(--ui);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid transparent;
        opacity: 0.85;
        transition:
          background 0.16s ease,
          opacity 0.16s ease,
          border-color 0.16s ease;
      }
      #nav .links a:hover {
        opacity: 1;
        background: var(--glass);
        border-color: var(--hairline);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      #nav .links a:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.72);
        outline-offset: 3px;
      }
      #nav .mobile-hero {
        display: none;
      }
      #nav .mobile-tagline {
        display: block;
        width: 100%;
        margin: 0;
        color: #fff;
        font-size: clamp(38px, 12.2vw, 54px);
        line-height: 0.94;
        font-weight: 780;
        letter-spacing: 0;
      }
      #nav .mobile-command {
        display: inline-flex;
        width: min(340px, calc(100vw - 32px));
        box-sizing: border-box;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        margin-top: 18px;
        padding: 9px 11px;
        color: rgba(255, 255, 255, 0.92);
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.08),
            rgba(255, 255, 255, 0.02)
          ),
          rgba(4, 7, 10, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 12px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 12px 34px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(12px) saturate(130%);
        -webkit-backdrop-filter: blur(12px) saturate(130%);
        pointer-events: auto;
      }
      #nav .mobile-command-prompt {
        flex: 0 0 auto;
        color: #78ffbe;
        font:
          700 clamp(9px, 2.8vw, 11px) ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          monospace;
        line-height: 1;
      }
      #nav .mobile-command code {
        display: block;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
        font:
          650 clamp(9px, 2.8vw, 11px) ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          monospace;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      :root[data-hero-promo="expanded"] #nav {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        row-gap: 24px;
        align-items: start;
      }
      :root[data-hero-promo="expanded"] #nav .nav-top {
        display: flex;
        align-items: center;
        min-width: 0;
      }
      :root[data-hero-promo="expanded"] #nav .brand-tagline {
        display: none;
      }
      :root[data-hero-promo="expanded"] #nav .links {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
      }
      :root[data-hero-promo="expanded"] #nav .mobile-hero {
        display: block;
        grid-column: 1 / -1;
        width: min(720px, 100%);
        margin-top: 0;
      }

      /* --- story card ------------------------------------------------- */
      #story-card {
        position: relative;
        top: auto;
        right: auto;
        left: auto;
        z-index: 10;
        width: min(var(--hero-desktop-card-width), calc(100vw - 48px));
        height: var(--story-card-height, auto);
        box-sizing: border-box;
        padding: 22px 24px 24px;
        color: #fff;
        background: var(--glass);
        border: 1px solid var(--hairline);
        border-radius: 18px;
        backdrop-filter: blur(12px) saturate(130%);
        -webkit-backdrop-filter: blur(12px) saturate(130%);
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.38);
        pointer-events: auto;
        user-select: none;
        transform: none;
      }
      #story-card > div {
        display: block;
      }
      #story-segments {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 24px;
      }
      .story-segment {
        position: relative;
        min-width: 0;
        height: 4px;
        padding: 0;
        border: 0;
        background: transparent;
        color: transparent;
        cursor: pointer;
      }
      .story-segment::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: auto;
        left: 0;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.24);
        transition:
          background 0.32s ease,
          box-shadow 0.32s ease;
      }
      .story-segment span {
        display: none;
      }
      .story-segment small {
        display: none;
      }
      .story-segment[aria-current="true"]::before {
        background: #fff;
        box-shadow: 0 0 14px rgba(255, 255, 255, 0.46);
      }
      #story-title {
        margin: 0 0 14px;
        max-width: 12ch;
        font-size: 38px;
        line-height: 1.03;
        letter-spacing: 0;
        font-weight: 760;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
      #story-body {
        margin: 0;
        font-size: 15px;
        line-height: 1.55;
        color: var(--muted);
      }
      #story-scroll {
        position: relative;
        z-index: 2;
        pointer-events: none;
      }
      .story-step {
        height: 100vh;
      }

      :root[data-hero-composition="vertical"] #hero-stage {
        top: calc(var(--hero-nav-bottom, 70px) + 16px);
        right: 16px;
        bottom: 18px;
        left: 16px;
        display: grid;
        width: auto;
        height: auto;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        gap: var(--hero-vertical-gap);
        align-items: stretch;
        justify-items: center;
        transform: none;
      }
      :root[data-hero-composition="vertical"] #story-card {
        position: relative;
        top: auto;
        right: auto;
        bottom: auto;
        left: auto;
        width: 100%;
        transform: none;
      }
      :root[data-hero-composition="vertical"] #landing-city-slot {
        position: relative;
        top: auto;
        bottom: auto;
        left: auto;
        width: min(760px, calc(100vw - 16px));
        height: 100%;
        transform: none;
      }
      :root[data-hero-composition="vertical"] #story-title {
        max-width: 14ch;
        font-size: 30px;
      }

      /* Keep in sync with HERO_MOBILE_NAV_BREAKPOINT_PX. */
      @media (max-width: 760px) {
        #nav {
          display: block;
          right: 0;
          left: 0;
          width: auto;
          padding: 14px 16px 0;
          transform: none;
        }
        #nav .nav-top {
          display: flex;
          align-items: center;
          justify-content: space-between;
        }
        #nav .brand {
          gap: 8px;
          width: auto;
          text-align: left;
        }
        #nav .brand img {
          width: 26px;
          height: 26px;
        }
        #nav .brand-copy {
          display: flex;
        }
        #nav .brand-name {
          font-size: 24px;
          line-height: 1;
        }
        #nav .brand-tagline {
          display: none;
        }
        #nav .menu-toggle {
          display: grid;
        }
        #nav .mobile-hero {
          position: relative;
          z-index: 1;
          width: calc(100vw - 32px);
          margin-top: 24px;
        }
        #nav .links {
          position: fixed;
          top: 58px;
          right: 16px;
          z-index: 4;
          display: flex;
          width: min(196px, calc(100vw - 32px));
          flex-direction: column;
          gap: 4px;
          padding: 8px;
          background: rgba(8, 11, 16, 0.78);
          border: 1px solid var(--hairline);
          border-radius: 14px;
          box-shadow: 0 12px 36px rgba(0, 0, 0, 0.28);
          backdrop-filter: blur(12px) saturate(130%);
          -webkit-backdrop-filter: blur(12px) saturate(130%);
          opacity: 0;
          visibility: hidden;
          transform: translateY(-6px);
          transition:
            opacity 0.16s ease,
            transform 0.16s ease,
            visibility 0.16s ease;
        }
        #nav .links[data-open="true"] {
          opacity: 1;
          transform: translateY(0);
          visibility: visible;
        }
        #nav .links a {
          border-radius: 10px;
          padding: 10px 12px;
          font-size: 12px;
        }
        #landing-city-slot {
          width: min(560px, calc(100vw - 16px));
        }
        #story-title {
          max-width: 14ch;
          font-size: 30px;
        }
      }
      @media (max-width: 360px) {
        #nav .mobile-hero {
          margin-top: 18px;
        }
        #nav .mobile-tagline {
          font-size: clamp(34px, 11.2vw, 39px);
          line-height: 0.94;
        }
        #nav .mobile-command {
          margin-top: 12px;
          padding: 9px 12px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="aperture"></canvas>

    <nav id="nav">
      <span class="nav-top">
        <span class="brand">
          <img src="aperture.svg" alt="" />
          <span class="brand-copy">
            <span class="brand-name">Aperture</span>
            <span class="brand-tagline">3D engine for the agentic age.</span>
          </span>
        </span>
        <button
          id="nav-menu-toggle"
          class="menu-toggle"
          type="button"
          aria-label="Menu"
          aria-expanded="false"
          aria-controls="nav-links"
        >
          <span class="menu-icon" aria-hidden="true"></span>
        </button>
      </span>
      <span id="nav-links" class="links">
        <a href="docs/">Docs</a>
        <a href="examples/">Examples</a>
        <a href="showcases/">Showcases</a>
        <a href="https://github.com/felixtrz/aperture">GitHub</a>
      </span>
      <span class="mobile-hero">
        <span class="mobile-tagline">3D engine for the agentic age.</span>
        <span class="mobile-command">
          <span class="mobile-command-prompt" aria-hidden="true">$</span>
          <code>npx @aperture-engine/cli create my-app</code>
        </span>
      </span>
    </nav>

    <section id="hero-stage">
      <div id="landing-city-slot" data-aperture-slot="landing-city"></div>

      <aside id="story-card" aria-live="polite">
        <div>
          <div
            id="story-segments"
            role="tablist"
            aria-label="Engine story"
          ></div>
          <h1 id="story-title"></h1>
          <p id="story-body"></p>
        </div>
      </aside>
    </section>

    <main id="story-scroll" aria-hidden="true"></main>

    <script type="module">
      import {
        HERO_STORY_COMMAND_CHANNEL,
        HERO_STORY_MOMENTS,
      } from "/src/lib/hero-story.ts";
      import {
        HERO_DESKTOP_CARD_WIDTH_PX,
        HERO_DESKTOP_CITY_MIN_WIDTH_PX,
        HERO_DESKTOP_CITY_PANEL_GAP_PX,
        HERO_DESKTOP_COMPOSITION_MAX_WIDTH_PX,
        HERO_DESKTOP_COMPOSITION_SIDE_GUTTER_PX,
        HERO_HORIZONTAL_LAYOUT_MIN_WIDTH_PX,
        HERO_HORIZONTAL_PROMO_MIN_STAGE_HEIGHT_PX,
        HERO_MOBILE_NAV_BREAKPOINT_PX,
        HERO_PROMO_BOTTOM_RESERVE_PX,
        HERO_PROMO_TOP_RESERVE_ESTIMATE_PX,
        HERO_VERTICAL_CITY_CARD_GAP_PX,
        HERO_VERTICAL_FULL_NAV_PROMO_MIN_CITY_HEIGHT_PX,
        HERO_VERTICAL_PROMO_MIN_CITY_HEIGHT_PX,
      } from "/src/lib/hero-layout.ts";
      import {
        dispatchApertureHtmlEvent,
        observeApertureHtmlSlots,
      } from "@aperture-engine/app/browser";
      import "virtual:aperture/browser-entry";

      const segments = document.querySelector("#story-segments");
      const card = document.querySelector("#story-card");
      const title = document.querySelector("#story-title");
      const body = document.querySelector("#story-body");
      const citySlot = document.querySelector("#landing-city-slot");
      const nav = document.querySelector("#nav");
      const navMenuToggle = document.querySelector("#nav-menu-toggle");
      const navLinks = document.querySelector("#nav-links");
      const mobileNavQuery = window.matchMedia(
        `(max-width: ${HERO_MOBILE_NAV_BREAKPOINT_PX}px)`,
      );
      document.documentElement.style.setProperty(
        "--hero-desktop-card-width",
        `${HERO_DESKTOP_CARD_WIDTH_PX}px`,
      );
      document.documentElement.style.setProperty(
        "--hero-desktop-city-min-width",
        `${HERO_DESKTOP_CITY_MIN_WIDTH_PX}px`,
      );
      document.documentElement.style.setProperty(
        "--hero-desktop-city-panel-gap",
        `${HERO_DESKTOP_CITY_PANEL_GAP_PX}px`,
      );
      document.documentElement.style.setProperty(
        "--hero-desktop-stage-max",
        `${HERO_DESKTOP_COMPOSITION_MAX_WIDTH_PX}px`,
      );
      document.documentElement.style.setProperty(
        "--hero-desktop-side-gutter",
        `${HERO_DESKTOP_COMPOSITION_SIDE_GUTTER_PX}px`,
      );

      let activeIndex = 0;
      let activePhase = HERO_STORY_MOMENTS[0]?.phase ?? 0;
      let activeLayoutSignature = "";
      let activeStoryPhaseSignature = "";
      let htmlSlots = null;
      const storyCycleCount = HERO_STORY_MOMENTS.length;
      let resizeFrame = 0;
      let transitionFrame = 0;
      let queuedDirection = 0;
      let wheelGestureDelta = 0;
      let wheelGestureTimer = 0;
      let pointerGesture = null;
      const transitionDurationMs = 1230;
      const wheelGestureIdleMs = 150;
      const wheelGestureThresholdPx = 86;
      const pointerGestureThresholdPx = 46;
      const pointerVelocityThresholdPxPerMs = 0.42;
      const reducedMotionQuery = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      );

      function setNavMenuOpen(open) {
        navLinks.dataset.open = String(open);
        navMenuToggle.setAttribute("aria-expanded", String(open));
      }

      navMenuToggle.addEventListener("click", () => {
        setNavMenuOpen(navLinks.dataset.open !== "true");
      });
      navLinks.addEventListener("click", (event) => {
        if (event.target instanceof HTMLAnchorElement) {
          setNavMenuOpen(false);
        }
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setNavMenuOpen(false);
          return;
        }
        if (isTextEditingTarget(event.target)) {
          return;
        }
        if (event.key === "ArrowDown" || event.key === "PageDown") {
          event.preventDefault();
          navigateByDirection(1);
          return;
        }
        if (event.key === "ArrowUp" || event.key === "PageUp") {
          event.preventDefault();
          navigateByDirection(-1);
          return;
        }
        if (event.key === " " && event.shiftKey) {
          event.preventDefault();
          navigateByDirection(-1);
          return;
        }
        if (event.key === " ") {
          event.preventDefault();
          navigateByDirection(1);
          return;
        }
        if (event.key === "Home") {
          event.preventDefault();
          navigateToIndex(0, { interrupt: true });
          return;
        }
        if (event.key === "End") {
          event.preventDefault();
          navigateToIndex(storyCycleCount - 1, { interrupt: true });
        }
      });

      function dispatchStoryPhase(moment, phase, force = false) {
        const wrappedPhase = wrapPhase(phase);
        const signature = `${moment.id}:${wrappedPhase.toFixed(4)}`;
        if (!force && activeStoryPhaseSignature === signature) return;
        activeStoryPhaseSignature = signature;
        dispatchApertureHtmlEvent(HERO_STORY_COMMAND_CHANNEL, {
          kind: "set-phase",
          moment: moment.id,
          phase: wrappedPhase,
        });
      }

      function canUseHorizontalComposition() {
        return window.innerWidth >= HERO_HORIZONTAL_LAYOUT_MIN_WIDTH_PX;
      }

      function canShowPromo(composition, cardHeight, mobileNav) {
        if (composition === "horizontal") {
          const minCoreHeight = Math.max(
            HERO_HORIZONTAL_PROMO_MIN_STAGE_HEIGHT_PX,
            cardHeight,
          );
          return (
            window.innerHeight >=
            HERO_PROMO_TOP_RESERVE_ESTIMATE_PX +
              minCoreHeight +
              HERO_PROMO_BOTTOM_RESERVE_PX
          );
        }
        const minCityHeight = mobileNav
          ? HERO_VERTICAL_PROMO_MIN_CITY_HEIGHT_PX
          : HERO_VERTICAL_FULL_NAV_PROMO_MIN_CITY_HEIGHT_PX;
        return (
          window.innerHeight >=
          HERO_PROMO_TOP_RESERVE_ESTIMATE_PX +
            minCityHeight +
            HERO_VERTICAL_CITY_CARD_GAP_PX +
            cardHeight
        );
      }

      function syncStageMetrics(promo) {
        const navBottom = Math.ceil(
          nav.getBoundingClientRect().bottom || 70,
        );
        const topReserve =
          promo === "expanded" ? navBottom + 24 : 64;
        const bottomReserve =
          promo === "expanded" ? HERO_PROMO_BOTTOM_RESERVE_PX : 64;
        const availableHeight = Math.max(
          0,
          window.innerHeight - topReserve - bottomReserve,
        );
        const stageHeight = Math.min(760, availableHeight);
        const stageCenterY = topReserve + availableHeight / 2;
        document.documentElement.style.setProperty(
          "--hero-nav-bottom",
          `${navBottom}px`,
        );
        document.documentElement.style.setProperty(
          "--hero-stage-height",
          `${stageHeight}px`,
        );
        document.documentElement.style.setProperty(
          "--hero-stage-center-y",
          `${stageCenterY}px`,
        );
      }

      function layoutSignature(composition, promo, mobile) {
        const cardRect = card.getBoundingClientRect();
        const slotRect = citySlot.getBoundingClientRect();
        return [
          composition,
          promo,
          mobile,
          Math.round(window.innerWidth),
          Math.round(window.innerHeight),
          Math.round(cardRect.left),
          Math.round(cardRect.width),
          Math.round(cardRect.height),
          Math.round(slotRect.left),
          Math.round(slotRect.top),
          Math.round(slotRect.width),
          Math.round(slotRect.height),
        ].join(":");
      }

      function syncResponsiveLayout(force = false) {
        const composition = canUseHorizontalComposition()
          ? "horizontal"
          : "vertical";
        const mobileNav = mobileNavQuery.matches;
        document.documentElement.dataset.heroComposition = composition;
        document.documentElement.dataset.heroMobileNav = String(mobileNav);
        syncStoryCardHeight();
        const cardHeight = Math.ceil(card.getBoundingClientRect().height);
        const promo = canShowPromo(composition, cardHeight, mobileNav)
          ? "expanded"
          : "hidden";
        document.documentElement.dataset.heroPromo = promo;
        syncStageMetrics(promo);
        if (!mobileNav) {
          setNavMenuOpen(false);
        }
        const signature = layoutSignature(composition, promo, mobileNav);
        if (!force && activeLayoutSignature === signature) return;
        activeLayoutSignature = signature;
        htmlSlots?.flush("responsive-layout");
      }

      function renderStory(index) {
        const moment = HERO_STORY_MOMENTS[index];
        if (!moment) return;
        activeIndex = index;
        title.textContent = moment.title;
        body.textContent = moment.body;
        for (const [buttonIndex, button] of [
          ...segments.querySelectorAll(".story-segment"),
        ].entries()) {
          button.setAttribute(
            "aria-current",
            String(buttonIndex === activeIndex),
          );
        }
      }

      function wrapIndex(index) {
        return ((index % storyCycleCount) + storyCycleCount) % storyCycleCount;
      }

      function wrapPhase(phase) {
        return ((phase % 1) + 1) % 1;
      }

      function phaseTargetForDirection(from, to, direction) {
        if (direction < 0 && to > from) {
          return to - 1;
        }
        if (direction >= 0 && to < from) {
          return to + 1;
        }
        return to;
      }

      function easeInOutCubic(value) {
        return value < 0.5
          ? 4 * value * value * value
          : 1 - Math.pow(-2 * value + 2, 3) / 2;
      }

      function shortestDirectionToIndex(index) {
        const target = wrapIndex(index);
        const forward = wrapIndex(target - activeIndex);
        const backward = wrapIndex(activeIndex - target);
        return forward <= backward ? 1 : -1;
      }

      function syncStoryPhase(force = false) {
        const moment = HERO_STORY_MOMENTS[activeIndex];
        if (!moment) return;
        dispatchStoryPhase(moment, activePhase, force);
      }

      function primeInitialStoryPhase() {
        let remaining = 6;
        const prime = () => {
          syncStoryPhase(true);
          remaining -= 1;
          if (remaining <= 0) {
            return;
          }
          requestAnimationFrame(prime);
        };
        requestAnimationFrame(prime);
      }

      function cancelStoryTransition() {
        if (transitionFrame === 0) return;
        cancelAnimationFrame(transitionFrame);
        transitionFrame = 0;
      }

      function finishTransition(moment, targetPhase, force = false) {
        activePhase = wrapPhase(targetPhase);
        transitionFrame = 0;
        dispatchStoryPhase(moment, activePhase, force);
        if (queuedDirection !== 0) {
          const direction = queuedDirection;
          queuedDirection = 0;
          navigateByDirection(direction);
        }
      }

      function animateStoryPhase(moment, targetPhase, direction) {
        const startPhase = activePhase;
        const resolvedTargetPhase = phaseTargetForDirection(
          startPhase,
          targetPhase,
          direction,
        );
        const duration = reducedMotionQuery.matches ? 0 : transitionDurationMs;
        if (duration <= 0) {
          finishTransition(moment, resolvedTargetPhase, true);
          return;
        }

        const startedAt = performance.now();
        const tick = (now) => {
          const elapsed = now - startedAt;
          const progress = Math.min(Math.max(elapsed / duration, 0), 1);
          const eased = easeInOutCubic(progress);
          activePhase = wrapPhase(
            startPhase + (resolvedTargetPhase - startPhase) * eased,
          );
          dispatchStoryPhase(moment, activePhase);
          if (progress >= 1) {
            finishTransition(moment, resolvedTargetPhase);
            return;
          }
          transitionFrame = requestAnimationFrame(tick);
        };
        transitionFrame = requestAnimationFrame(tick);
      }

      function navigateToIndex(index, options = {}) {
        const targetIndex = wrapIndex(index);
        if (targetIndex === activeIndex && transitionFrame === 0) {
          syncStoryPhase(true);
          return;
        }
        if (options.interrupt === true) {
          queuedDirection = 0;
        }
        if (transitionFrame !== 0 && options.interrupt !== true) {
          queuedDirection = options.direction ?? shortestDirectionToIndex(index);
          return;
        }
        cancelStoryTransition();

        const direction = options.direction ?? shortestDirectionToIndex(index);
        const moment = HERO_STORY_MOMENTS[targetIndex];
        if (!moment) return;
        renderStory(targetIndex);
        animateStoryPhase(moment, moment.phase, direction);
      }

      function navigateByDirection(direction) {
        const normalized = direction < 0 ? -1 : 1;
        navigateToIndex(activeIndex + normalized, {
          direction: normalized,
        });
      }

      function syncStoryCardHeight() {
        const currentTitle = title.textContent;
        const currentBody = body.textContent;
        const currentVisibility = card.style.visibility;
        card.style.removeProperty("--story-card-height");
        card.style.visibility = "hidden";

        let maxHeight = 0;
        for (const moment of HERO_STORY_MOMENTS) {
          title.textContent = moment.title;
          body.textContent = moment.body;
          maxHeight = Math.max(
            maxHeight,
            Math.ceil(card.getBoundingClientRect().height),
          );
        }

        card.style.setProperty("--story-card-height", `${maxHeight}px`);
        document.documentElement.style.setProperty(
          "--story-card-height",
          `${maxHeight}px`,
        );
        title.textContent = currentTitle;
        body.textContent = currentBody;
        card.style.visibility = currentVisibility;
      }

      for (const [index, moment] of HERO_STORY_MOMENTS.entries()) {
        const button = document.createElement("button");
        button.className = "story-segment";
        button.type = "button";
        button.setAttribute("aria-label", moment.title);
        button.innerHTML = `<span>${moment.label}</span>`;
        button.addEventListener("click", () => {
          navigateToIndex(index, { interrupt: true });
        });
        segments.append(button);
      }

      for (let copy = 0; copy < 1; copy += 1) {
        for (let index = 0; index < storyCycleCount; index += 1) {
          const step = document.createElement("section");
          step.className = "story-step";
          document.querySelector("#story-scroll")?.append(step);
        }
      }

      function isTextEditingTarget(target) {
        return (
          target instanceof Element &&
          target.closest(
            'input, textarea, select, [contenteditable="true"], [role="textbox"]',
          ) !== null
        );
      }

      function isInteractiveTarget(target) {
        return (
          target instanceof Element &&
          target.closest(
            'a, button, input, textarea, select, [contenteditable="true"], [role="button"]',
          ) !== null
        );
      }

      function wheelDeltaPixels(event) {
        if (event.deltaMode === WheelEvent.DOM_DELTA_LINE) {
          return event.deltaY * 16;
        }
        if (event.deltaMode === WheelEvent.DOM_DELTA_PAGE) {
          return event.deltaY * window.innerHeight;
        }
        return event.deltaY;
      }

      function commitWheelGesture() {
        const delta = wheelGestureDelta;
        wheelGestureDelta = 0;
        wheelGestureTimer = 0;
        if (Math.abs(delta) < wheelGestureThresholdPx) {
          return;
        }
        navigateByDirection(delta > 0 ? 1 : -1);
      }

      window.addEventListener(
        "wheel",
        (event) => {
          if (event.ctrlKey || event.metaKey) {
            return;
          }
          event.preventDefault();
          wheelGestureDelta += wheelDeltaPixels(event);
          if (wheelGestureTimer !== 0) {
            window.clearTimeout(wheelGestureTimer);
          }
          wheelGestureTimer = window.setTimeout(
            commitWheelGesture,
            wheelGestureIdleMs,
          );
        },
        { passive: false },
      );

      window.addEventListener(
        "pointerdown",
        (event) => {
          if (event.pointerType === "mouse" || isInteractiveTarget(event.target)) {
            return;
          }
          pointerGesture = {
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            lastX: event.clientX,
            lastY: event.clientY,
            startedAt: performance.now(),
          };
        },
        { passive: true },
      );

      window.addEventListener(
        "pointermove",
        (event) => {
          if (
            pointerGesture === null ||
            pointerGesture.pointerId !== event.pointerId
          ) {
            return;
          }
          pointerGesture.lastX = event.clientX;
          pointerGesture.lastY = event.clientY;
        },
        { passive: true },
      );

      function commitPointerGesture(event) {
        if (
          pointerGesture === null ||
          pointerGesture.pointerId !== event.pointerId
        ) {
          pointerGesture = null;
          return;
        }
        const deltaX = event.clientX - pointerGesture.startX;
        const deltaY = event.clientY - pointerGesture.startY;
        const elapsed = Math.max(1, performance.now() - pointerGesture.startedAt);
        const absDeltaX = Math.abs(deltaX);
        const absDeltaY = Math.abs(deltaY);
        let gestureDelta = 0;
        if (absDeltaX >= absDeltaY * 1.2) {
          gestureDelta = deltaX;
        } else if (absDeltaY >= absDeltaX * 1.2) {
          gestureDelta = deltaY;
        }
        const velocity = Math.abs(gestureDelta) / elapsed;
        pointerGesture = null;

        if (
          gestureDelta === 0 ||
          (Math.abs(gestureDelta) < pointerGestureThresholdPx &&
            velocity < pointerVelocityThresholdPxPerMs)
        ) {
          return;
        }
        navigateByDirection(gestureDelta < 0 ? 1 : -1);
      }

      window.addEventListener("pointerup", commitPointerGesture, {
        passive: true,
      });
      window.addEventListener("pointercancel", () => {
        pointerGesture = null;
      });

      window.addEventListener(
        "resize",
        () => {
          if (resizeFrame) cancelAnimationFrame(resizeFrame);
          resizeFrame = requestAnimationFrame(() => {
            resizeFrame = 0;
            renderStory(activeIndex);
            syncResponsiveLayout(true);
            htmlSlots?.flush("resize");
            syncStoryPhase(true);
          });
        },
        { passive: true },
      );

      mobileNavQuery.addEventListener("change", () => syncResponsiveLayout(true));
      renderStory(activeIndex);
      syncResponsiveLayout(true);
      htmlSlots = observeApertureHtmlSlots({ viewportElement: "#aperture" });
      requestAnimationFrame(() => syncResponsiveLayout(true));
      window.addEventListener("load", () => syncResponsiveLayout(true), {
        once: true,
      });
      syncStoryPhase(true);
      primeInitialStoryPhase();
    </script>
  </body>
</html>
